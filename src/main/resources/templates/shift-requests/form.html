<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>勤務希望登録</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>勤務希望登録</h1>

<form action="/shift-requests" method="post">
    <p>
        <label for="employeeId">従業員</label><br>
        <select id="employeeId" name="employeeId" required>
            <option value="">選択してください</option>
            <option th:each="employee : ${employees}"
                    th:value="${employee.id}"
                    th:text="${employee.name}">
                山田 太郎
            </option>
        </select>
    </p>

    <p>
        <label for="workDate">日付</label><br>
        <input type="date" id="workDate" name="workDate" required>
    </p>

    <p>
        <label for="startTime">開始時刻</label><br>
        <select id="startTime" name="startTime" required>
            <option value="">選択してください</option>
            <option th:each="time : ${timeOptions}"
                    th:value="${time}"
                    th:text="${time}">
                09:00
            </option>
        </select>
    </p>

    <p>
        <label for="endTime">終了時刻</label><br>
        <select id="endTime" name="endTime" required>
            <option value="">選択してください</option>
            <option th:each="time : ${timeOptions}"
                    th:value="${time}"
                    th:text="${time}">
                09:30
            </option>
        </select>
    </p>

    <p>
        <label for="requestType">希望区分</label><br>
        <select id="requestType" name="requestType" required>
            <option value="出勤希望">出勤希望</option>
            <option value="休み希望">休み希望</option>
        </select>
    </p>

    <button type="submit">登録する</button>
</form>

<p>
    <a href="/shift-requests">勤務希望一覧へ戻る</a>
</p>
</div>
</body>
</html>
