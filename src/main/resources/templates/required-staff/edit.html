<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>必要人数編集</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>必要人数編集</h1>

    <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
        エラーメッセージ
    </p>

    <form th:action="@{/required-staff/{id}/edit(id=${requiredStaff.id})}" method="post">
        <p>
            <label for="workDate">日付</label><br>
            <input type="date" id="workDate" name="workDate" th:value="${requiredStaff.workDate}" required>
        </p>

        <p>
            <label for="startTime">開始時刻</label><br>
            <select id="startTime" name="startTime" required>
                <option value="">選択してください</option>
                <option th:each="time : ${timeOptions}"
                        th:value="${time}"
                        th:text="${time}"
                        th:selected="${time == requiredStaff.startTime.toString()}">
                    09:00
                </option>
            </select>
        </p>

        <p>
            <label for="endTime">終了時刻</label><br>
            <select id="endTime" name="endTime" required>
                <option value="">選択してください</option>
                <option th:each="time : ${timeOptions}"
                        th:value="${time}"
                        th:text="${time}"
                        th:selected="${time == requiredStaff.endTime.toString()}">
                    09:30
                </option>
            </select>
        </p>

        <p>
            <label for="requiredCount">必要人数</label><br>
            <input type="number" id="requiredCount" name="requiredCount" th:value="${requiredStaff.requiredCount}" required>
        </p>

        <button type="submit">更新する</button>
    </form>

    <p class="back-link">
        <a href="/required-staff">必要人数一覧へ戻る</a>
    </p>
</div>
</body>
</html>
