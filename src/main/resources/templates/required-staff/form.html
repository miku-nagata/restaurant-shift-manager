<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>必要人数登録</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
<h1>必要人数登録</h1>
    <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
        エラーメッセージ
    </p>

<form action="/required-staff" method="post">
    <p>
        <label for="workDate">日付</label><br>
        <input type="date" id="workDate" name="workDate" th:value="${workDate}" required>
    </p>

    <p>
        <label for="startTime">開始時刻</label><br>
        <select id="startTime" name="startTime" required>
            <option value="">選択してください</option>
            <option th:each="time : ${timeOptions}"
                    th:value="${time}"
                    th:text="${time}"
                    th:selected="${time == selectedStartTime}">
                09:00
            </option>
        </select>
    </p>

    <p>
        <label for="endTime">終了時刻</label><br>
        <select id="endTime" name="endTime" required>
            <option value="">選択してください</option>
            <option th:each="time : ${timeOptions}"
                    th:value="${time}"
                    th:text="${time}"
                    th:selected="${time == selectedEndTime}">
                09:30
            </option>
        </select>
    </p>

    <p>
        <label for="requiredCount">必要人数</label><br>
        <input type="number" id="requiredCount" name="requiredCount" th:value="${requiredCount}" required>
    </p>

    <button type="submit">登録する</button>
</form>

<p>
    <a href="/required-staff">必要人数一覧へ戻る</a>
</p>
</div>
</body>
</html>
