<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>作成済みシフト一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="shift-assignment-page">
<header>
    <h1>作成済みシフト一覧</h1>
    <nav>
        <a th:href="@{/}">トップ</a>
        <a th:href="@{/employees}">従業員管理</a>
        <a th:href="@{/shift-requests}">勤務希望</a>
        <a th:href="@{/required-staff}">必要人数</a>
        <a th:href="@{/temporary-closures}">臨時休業</a>
    </nav>
</header>

<main>
    <section class="card">
        <h2 th:text="${year} + '年' + ${month} + '月のシフト結果'">
            2026年7月のシフト結果
        </h2>

        <form th:action="@{/shift-assignments}" method="get" class="form-inline">
            <label>
                年
                <input type="number" name="year" th:value="${year}">
            </label>

            <label>
                月
                <input type="number" name="month" min="1" max="12" th:value="${month}">
            </label>

            <button type="submit">表示</button>
        </form>

        <form th:action="@{/shift-assignments/create}" method="post" class="form-inline">
            <input type="hidden" name="year" th:value="${year}">
            <input type="hidden" name="month" th:value="${month}">

            <button type="submit"
                    onclick="return confirm('この月のシフトを自動作成します。既存のシフト結果は削除されます。よろしいですか？')">
                この月のシフトを自動作成
            </button>
        </form>
    </section>

    <section class="card">
        <h2>月間シフトカレンダー</h2>
        <p>
            作成済みシフト件数：
            <span th:text="${#lists.size(shiftAssignments)}">0</span>
            件
        </p>

        <table class="shift-calendar">
            <thead>
            <tr>
                <th class="sunday">日</th>
                <th>月</th>
                <th>火</th>
                <th>水</th>
                <th>木</th>
                <th>金</th>
                <th class="saturday">土</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="week : ${calendarWeeks}">
                <td th:each="date : ${week}"
                    class="calendar-cell"
                    th:classappend="${date == null} ? ' calendar-empty' : ' calendar-day'">

                    <div th:if="${date != null}"
                         th:with="
                        status=${dayStatusByDate.get(date.toString()) != null ? dayStatusByDate.get(date.toString()) : '未設定'},
                        slots=${slotStatusesByDate.get(date.toString())}">

                        <div class="calendar-date"
                             th:text="${date.dayOfMonth}">
                            1
                        </div>

                        <details class="day-status-detail">
                            <summary class="day-status-summary">

                                <span th:if="${status == '不足'}"
                                      class="status-dot status-shortage"></span>

                                <span th:if="${status == 'OK'}"
                                      class="status-dot status-ok"></span>

                                <span th:if="${status != '不足' and status != 'OK'}"
                                      class="status-dot status-none"></span>

                                <span class="status-text"
                                      th:text="${status}">
                                    OK
                                </span>
                            </summary>

                            <div class="calendar-popup">

                                <div th:if="${slots == null || #lists.isEmpty(slots)}"
                                     class="no-required-staff">
                                    必要人数未設定
                                </div>

                                <div th:each="slot : ${slots}"
                                     class="slot-status-row">

                                    <div class="slot-status-title">
                                        <strong th:text="${slot.timeLabel}">
                                            09:00〜11:00
                                        </strong>
                                        <span>
                                            必要
                                            <span th:text="${slot.requiredCount}">3</span>
                                            人
                                        </span>
                                    </div>

                                    <div class="mini-heatmap">
                                        <span th:each="block : ${slot.blocks}"
                                              class="mini-block"
                                              th:classappend="${block.shortage} ? ' block-shortage' : ' block-ok'"
                                              th:title="${block.label}">
                                        </span>
                                    </div>

                                    <div th:if="${slot.shortage}"
                                         class="shortage-label">
                                        ⚠
                                        <span th:text="${slot.shortageBlockCount}">1</span>
                                        コマ不足
                                    </div>

                                    <div th:unless="${slot.shortage}"
                                         class="ok-label">
                                        OK
                                    </div>

                                </div>

                            </div>
                        </details>

                    </div>

                </td>
            </tr>
            </tbody>
        </table>
    </section>
    <section class="card">
        <h2>全員のシフトを見る</h2>
        <table>
            <thead>
            <tr>
                <th>従業員名</th>
                <th>勤務日</th>
                <th>開始時刻</th>
                <th>終了時刻</th>
            </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </section>
</main>

</body>
</html>
