<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>臨時休業一覧</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>臨時休業一覧</h1>

    <p class="page-description">
        特定の日だけ休業する日を表示します。
    </p>

    <p>
        <a href="/temporary-closures/new">臨時休業を新規登録する</a>
    </p>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>休業日</th>
            <th>理由</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="temporaryClosure : ${temporaryClosures}">
            <td th:text="${temporaryClosure.id}">1</td>
            <td th:text="${temporaryClosure.closureDate}">2026-07-15</td>
            <td th:text="${temporaryClosure.reason}">お盆休み</td>
            <td>
                <form th:action="@{/temporary-closures/{id}/delete(id=${temporaryClosure.id})}" method="post" style="display:inline;">
                    <button type="submit" class="danger-button" onclick="return confirm('この臨時休業を削除しますか？');">
                        削除
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <p class="back-link">
        <a href="/shortages/calendar">不足状況カレンダーを見る</a>
    </p>

    <p class="back-link">
        <a href="/">トップページへ戻る</a>
    </p>
</div>
</body>
</html>
