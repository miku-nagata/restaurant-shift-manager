<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>臨時休業登録</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>臨時休業登録</h1>

    <p class="page-description">
        特定の日だけ休業する日を登録します。
    </p>

    <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
        エラーメッセージ
    </p>

    <form action="/temporary-closures" method="post">
        <p>
            <label for="closureDate">休業日</label><br>
            <input type="date" id="closureDate" name="closureDate" th:value="${closureDate}" required>
        </p>

        <p>
            <label for="reason">理由</label><br>
            <input type="text" id="reason" name="reason" th:value="${reason}" placeholder="例：お盆休み、設備点検">
        </p>

        <button type="submit">登録する</button>
    </form>

    <p class="back-link">
        <a href="/temporary-closures">臨時休業一覧へ戻る</a>
    </p>
</div>
</body>
</html>
