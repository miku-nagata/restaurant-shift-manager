<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>必要人数パターン登録</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>必要人数パターン登録</h1>

    <p class="page-description">
        曜日ごとの基本的な必要人数を登録します。複数の曜日をまとめて選択できます。
    </p>

    <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
        エラーメッセージ
    </p>

    <form action="/required-staff-patterns" method="post">
        <p>
            <label>対象曜日</label><br>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" name="dayOfWeeks" value="1"
                       th:checked="${dayOfWeeks != null and #lists.contains(dayOfWeeks, 1)}">
                月
            </label>

            <label>
                <input type="checkbox" name="dayOfWeeks" value="2"
                       th:checked="${dayOfWeeks != null and #lists.contains(dayOfWeeks, 2)}">
                火
            </label>

            <label>
                <input type="checkbox" name="dayOfWeeks" value="3"
                       th:checked="${dayOfWeeks != null and #lists.contains(dayOfWeeks, 3)}">
                水
            </label>

            <label>
                <input type="checkbox" name="dayOfWeeks" value="4"
                       th:checked="${dayOfWeeks != null and #lists.contains(dayOfWeeks, 4)}">
                木
            </label>

            <label>
                <input type="checkbox" name="dayOfWeeks" value="5"
                       th:checked="${dayOfWeeks != null and #lists.contains(dayOfWeeks, 5)}">
                金
            </label>

            <label>
                <input type="checkbox" name="dayOfWeeks" value="6"
                       th:checked="${dayOfWeeks != null and #lists.contains(dayOfWeeks, 6)}">
                土
            </label>

            <label>
                <input type="checkbox" name="dayOfWeeks" value="7"
                       th:checked="${dayOfWeeks != null and #lists.contains(dayOfWeeks, 7)}">
                日
            </label>
        </div>

        <h2>時間帯</h2>

        <table>
            <thead>
            <tr>
                <th>時間帯</th>
                <th>開始時刻</th>
                <th>終了時刻</th>
                <th>必要人数</th>
            </tr>
            </thead>

            <tbody>
            <tr>
                <td>時間帯1</td>
                <td>
                    <select name="startTime">
                        <option value="">選択してください</option>
                        <option th:each="timeOption : ${timeOptions}"
                                th:value="${timeOption}"
                                th:text="${timeOption}">
                        </option>
                    </select>
                </td>
                <td>
                    <select name="endTime">
                        <option value="">選択してください</option>
                        <option th:each="timeOption : ${timeOptions}"
                                th:value="${timeOption}"
                                th:text="${timeOption}">
                        </option>
                    </select>
                </td>
                <td>
                    <input type="number" name="requiredCount" min="1">
                </td>
            </tr>

            <tr id="timeSlot2" style="display: none;">
                <td>時間帯2</td>
                <td>
                    <select name="startTime2">
                        <option value="">選択してください</option>
                        <option th:each="timeOption : ${timeOptions}"
                                th:value="${timeOption}"
                                th:text="${timeOption}">
                        </option>
                    </select>
                </td>
                <td>
                    <select name="endTime2">
                        <option value="">選択してください</option>
                        <option th:each="timeOption : ${timeOptions}"
                                th:value="${timeOption}"
                                th:text="${timeOption}">
                        </option>
                    </select>
                </td>
                <td>
                    <input type="number" name="requiredCount2" min="1">
                </td>
            </tr>

            <tr id="timeSlot3" style="display: none;">
                <td>時間帯3</td>
                <td>
                    <select name="startTime3">
                        <option value="">選択してください</option>
                        <option th:each="timeOption : ${timeOptions}"
                                th:value="${timeOption}"
                                th:text="${timeOption}">
                        </option>
                    </select>
                </td>
                <td>
                    <select name="endTime3">
                        <option value="">選択してください</option>
                        <option th:each="timeOption : ${timeOptions}"
                                th:value="${timeOption}"
                                th:text="${timeOption}">
                        </option>
                    </select>
                </td>
                <td>
                    <input type="number" name="requiredCount3" min="1">
                </td>
            </tr>
            </tbody>
        </table>

        <p>
            <button type="button" onclick="addTimeSlot()">時間帯を追加する</button>
        </p>

        <script>
            let visibleTimeSlotCount = 1;

            function addTimeSlot() {
                if (visibleTimeSlotCount >= 3) {
                    alert("追加できる時間帯は3つまでです。");
                    return;
                }

                visibleTimeSlotCount++;

                const nextTimeSlot = document.getElementById("timeSlot" + visibleTimeSlotCount);
                nextTimeSlot.style.display = "table-row";
            }
        </script>

        <button type="submit">登録する</button>
    </form>

    <p class="back-link">
        <a href="/required-staff-patterns">必要人数パターン一覧へ戻る</a>
    </p>
</div>
</body>
</html>
