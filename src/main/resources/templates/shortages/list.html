<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>不足時間確認</title>
    <style>
        table {
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
        }

        .shortage {
            background-color: #ffcccc;
        }
    </style>
</head>
<body>
<h1>不足時間確認</h1>

<p>必要人数に対して、出勤希望人数が足りているかを確認します。</p>

<table>
    <thead>
    <tr>
        <th>日付</th>
        <th>開始時刻</th>
        <th>終了時刻</th>
        <th>必要人数</th>
        <th>出勤希望人数</th>
        <th>不足人数</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${shortageRows}"
        th:classappend="${row.shortage} ? 'shortage'">
        <td th:text="${row.workDate}">2026-06-27</td>
        <td th:text="${row.startTime}">09:00</td>
        <td th:text="${row.endTime}">11:00</td>
        <td th:text="${row.requiredCount}">3</td>
        <td th:text="${row.availableCount}">1</td>
        <td th:text="${row.shortageCount}">2</td>
    </tr>
    </tbody>
</table>

<p>
    <a href="/">トップページへ戻る</a>
</p>
</body>
</html>
